<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Amsterdam Roleplay Staff</title>
  <meta name="description" content="Amsterdam Roleplay staff portaal met dashboard, regels, functies, dossiers, support en tools." />
  <link rel="icon" type="image/png" href="assets/logo-amsterdam-roleplay.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page" data-page="">
  
  <main>
    <section class="login-screen">
      <div class="login-card">
        <img class="login-logo" src="assets/logo-amsterdam-roleplay.png" alt="" />
        <p class="eyebrow">Beveiligde staffomgeving</p>
        <h1>Staff <span>Portaal</span></h1>
        <p class="login-lead">Log in met Discord. Alleen leden met de staffrol krijgen toegang.</p>
        <div class="auth-status" data-staff-auth-status>Niet ingelogd. Log in via Discord.</div>
        <a class="discord-login" href="/api/staff/auth/login">Inloggen met Discord</a>
        <div class="login-links"><a href="/">Terug naar hoofdsite</a><a href="/overheid/">Overheid portaal</a></div>
        <footer>Amsterdam Roleplay staff portaal</footer>
      </div>
    </section></main>
  
  <script src="staff.js"></script>
</body>
</html>
